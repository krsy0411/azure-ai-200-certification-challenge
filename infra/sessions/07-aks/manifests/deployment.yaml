# apps/api (session-01 이미지)를 AKS Deployment 로 — ACA 와 같은 워크로드를 다른 호스트에.
# Workload Identity: 파드 label azure.workload.identity/use + ServiceAccount 로 시크릿 없이
# Azure 자원(AOAI·Cosmos)에 접근. __ACR_LOGIN_SERVER__·__UAMI_CLIENT_ID__ 는 배포 시 치환.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apps-api
  namespace: default
  labels:
    app: apps-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: apps-api
  template:
    metadata:
      labels:
        app: apps-api
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: apps-api-sa
      containers:
        - name: api
          image: __ACR_LOGIN_SERVER__/api:s01
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: apps-api-config
          env:
            - name: AZURE_CLIENT_ID
              value: "__UAMI_CLIENT_ID__"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi