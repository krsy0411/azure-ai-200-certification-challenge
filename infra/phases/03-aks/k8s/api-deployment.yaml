# AKS 에 배포할 FastAPI(api) 워크로드
# - Deployment 2 replicas (kubelet 이 UAMI 로 ACR pull)
# - ClusterIP Service :8000 (외부 노출 없음 — 보조 클러스터이므로 port-forward 로 검증)
# - HPA: CPU 50% 기준 1~5 replicas
#
# 이미지 경로의 __ACR_LOGIN_SERVER__ 는 본인 ACR 로그인 서버로 치환해 apply 한다:
#
#   ACR_LOGIN_SERVER="acr${PROJECT_ID}${ENV}${ACR_SUFFIX}.azurecr.io"
#   sed "s|__ACR_LOGIN_SERVER__|$ACR_LOGIN_SERVER|g" \
#     infra/phases/03-aks/k8s/api-deployment.yaml | kubectl apply -f -
#
# 이미지 태그는 ACA 와 동일한 Phase 1 푸시본(0.1.0)을 재사용.
apiVersion: v1
kind: Namespace
metadata:
  name: ai200
  labels:
    app.kubernetes.io/part-of: ai200challenge
    managed-by: kubectl
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: ai200
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: __ACR_LOGIN_SERVER__/api:0.1.0
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: ai200
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api
  namespace: ai200
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
