# 비민감 설정 (endpoint·deployment 이름). 학습 경로 모듈 2 의 ConfigMap 패턴.
# 자격증명은 K8s Secret 이 아니라 Workload Identity(DefaultAzureCredential)로 대체한다.
apiVersion: v1
kind: ConfigMap
metadata:
  name: apps-api-config
  namespace: default
data:
  AZURE_OPENAI_ENDPOINT: "__AOAI_ENDPOINT__"
  AZURE_OPENAI_CHAT_DEPLOYMENT: "gpt-5-mini"
  AZURE_OPENAI_EMBED_DEPLOYMENT: "text-embedding-3-large"
  AZURE_OPENAI_API_VERSION: "2024-08-01-preview"
  COSMOS_ENDPOINT: "__COSMOS_ENDPOINT__"
  COSMOS_DATABASE: "appdb"
  COSMOS_CHUNKS_CONTAINER: "chunks"
  STORE_BACKEND: "cosmos"