# Workload Identity 와 연결되는 ServiceAccount.
# annotation 의 client-id 는 session-00 UAMI(id-ai200ws-dev)의 clientId 로 치환한다.
# Bicep 의 federatedIdentityCredential subject(system:serviceaccount:default:apps-api-sa)와
# namespace:name 이 일치해야 한다.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: apps-api-sa
  namespace: default
  annotations:
    azure.workload.identity/client-id: "__UAMI_CLIENT_ID__"