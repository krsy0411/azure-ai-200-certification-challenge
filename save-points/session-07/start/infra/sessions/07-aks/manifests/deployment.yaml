#   - envFrom configMapRef apps-api-config
#   - env AZURE_CLIENT_ID = "__UAMI_CLIENT_ID__"
#   - readiness/liveness probe httpGet /healthz:8000
#   - resources requests/limits (250m/512Mi ~ 500m/1Gi)